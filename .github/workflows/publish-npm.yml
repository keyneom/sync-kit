name: publish-npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - run: corepack enable
      - run: corepack prepare pnpm@9.15.9 --activate
      - run: npm ci
      - run: npm run check

      - name: Resolve and verify release
        id: release
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          repository="$(node -p "require('./package.json').repository?.url ?? ''")"
          if [ "${GITHUB_REF_NAME}" != "v${version}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${version}." >&2
            exit 1
          fi
          if [ "${repository}" != "https://github.com/keyneom/sync-kit" ]; then
            echo "package.json repository.url cannot be verified for npm provenance." >&2
            exit 1
          fi
          if [[ "${version}" == *-* ]]; then
            echo "dist_tag=rc" >> "$GITHUB_OUTPUT"
          else
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        run: npm publish --tag "${{ steps.release.outputs.dist_tag }}"
